<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NEON BLASTER</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  overflow:hidden;
  background:#050816;
}

canvas{
  display:block;
}

#ui{
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  z-index:10;
  font-size:24px;
  text-shadow:0 0 10px cyan;
}

#gameOver{
  position:absolute;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:rgba(0,0,0,0.8);
  color:white;
  z-index:20;
}

#gameOver h1{
  font-size:90px;
  color:#00ffff;
  text-shadow:0 0 30px cyan;
}

#gameOver button{
  margin-top:20px;
  padding:15px 30px;
  border:none;
  border-radius:12px;
  background:#00ffff;
  color:black;
  font-size:22px;
  cursor:pointer;
  font-weight:bold;
  box-shadow:0 0 20px cyan;
}

#info{
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
  color:#94a3b8;
  font-size:15px;
}
</style>
</head>

<body>

<div id="ui">
  ❤️ HP: <span id="hp">100</span><br>
  ⚡ Score: <span id="score">0</span>
</div>

<div id="gameOver">
  <h1>GAME OVER</h1>
  <p id="finalScore"></p>
  <button onclick="location.reload()">MAIN LAGI</button>
</div>

<div id="info">
  WASD / Arrow = Gerak • Tahan Klik = Tembak
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();

let mouse = {
  x: canvas.width/2,
  y: canvas.height/2
};

document.addEventListener("mousemove", e=>{
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

const keys = {};

document.addEventListener("keydown", e=>{
  keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e=>{
  keys[e.key.toLowerCase()] = false;
});

class Player{
  constructor(){
    this.x = canvas.width/2;
    this.y = canvas.height/2;
    this.r = 20;
    this.speed = 5;
    this.hp = 100;
    this.hitCooldown = 0;
  }

  move(){

    if(keys["w"] || keys["arrowup"]) this.y -= this.speed;
    if(keys["s"] || keys["arrowdown"]) this.y += this.speed;
    if(keys["a"] || keys["arrowleft"]) this.x -= this.speed;
    if(keys["d"] || keys["arrowright"]) this.x += this.speed;

    this.x = Math.max(this.r, Math.min(canvas.width-this.r, this.x));
    this.y = Math.max(this.r, Math.min(canvas.height-this.r, this.y));

    if(this.hitCooldown > 0){
      this.hitCooldown--;
    }
  }

  draw(){

    ctx.beginPath();
    ctx.arc(this.x,this.y,this.r,0,Math.PI*2);

    ctx.fillStyle =
      this.hitCooldown > 0 ? "#ffffff" : "#00ffff";

    ctx.shadowBlur = 25;
    ctx.shadowColor = "#00ffff";

    ctx.fill();

    ctx.shadowBlur = 0;

    const angle = Math.atan2(
      mouse.y-this.y,
      mouse.x-this.x
    );

    ctx.strokeStyle = "white";
    ctx.lineWidth = 5;

    ctx.beginPath();
    ctx.moveTo(this.x,this.y);

    ctx.lineTo(
      this.x + Math.cos(angle)*35,
      this.y + Math.sin(angle)*35
    );

    ctx.stroke();
  }
}

class Bullet{
  constructor(x,y,dx,dy){
    this.x=x;
    this.y=y;
    this.dx=dx;
    this.dy=dy;
    this.r=5;
  }

  update(){
    this.x += this.dx;
    this.y += this.dy;
  }

  draw(){

    ctx.beginPath();
    ctx.moveTo(this.x,this.y);

    ctx.lineTo(
      this.x - this.dx*2,
      this.y - this.dy*2
    );

    ctx.strokeStyle = "#fff700";
    ctx.lineWidth = 3;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(this.x,this.y,this.r,0,Math.PI*2);

    ctx.fillStyle = "#fff700";

    ctx.shadowBlur = 20;
    ctx.shadowColor = "#fff700";

    ctx.fill();

    ctx.shadowBlur = 0;
  }
}

class Enemy{
  constructor(){

    const side = Math.floor(Math.random()*4);

    if(side===0){
      this.x = Math.random()*canvas.width;
      this.y = -50;
    }

    if(side===1){
      this.x = canvas.width+50;
      this.y = Math.random()*canvas.height;
    }

    if(side===2){
      this.x = Math.random()*canvas.width;
      this.y = canvas.height+50;
    }

    if(side===3){
      this.x = -50;
      this.y = Math.random()*canvas.height;
    }

    this.r = 18 + Math.random()*18;
    this.speed = 1 + Math.random()*2;
  }

  update(){

    const angle = Math.atan2(
      player.y-this.y,
      player.x-this.x
    );

    this.x += Math.cos(angle)*this.speed;
    this.y += Math.sin(angle)*this.speed;
  }

  draw(){

    ctx.beginPath();
    ctx.arc(this.x,this.y,this.r,0,Math.PI*2);

    ctx.fillStyle = "#ff006e";

    ctx.shadowBlur = 25;
    ctx.shadowColor = "#ff006e";

    ctx.fill();

    ctx.shadowBlur = 0;
  }
}

class Particle{
  constructor(x,y,color){
    this.x=x;
    this.y=y;

    this.dx=(Math.random()-0.5)*7;
    this.dy=(Math.random()-0.5)*7;

    this.life=40;
    this.color=color;
  }

  update(){
    this.x += this.dx;
    this.y += this.dy;
    this.life--;
  }

  draw(){

    ctx.globalAlpha = this.life / 40;

    ctx.fillStyle = this.color;
    ctx.fillRect(this.x,this.y,3,3);

    ctx.globalAlpha = 1;
  }
}

const player = new Player();

let bullets = [];
let enemies = [];
let particles = [];

let score = 0;
let gameEnded = false;

let shooting = false;

let lastShot = 0;
const shootDelay = 120;

let spawnTimer = 0;
let spawnRate = 700;

let shake = 0;

// STARS
const stars = [];

for(let i=0;i<120;i++){
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    s: Math.random()*2
  });
}

document.addEventListener("mousedown", ()=>{
  shooting = true;
});

document.addEventListener("mouseup", ()=>{
  shooting = false;
});

function shoot(){

  if(gameEnded) return;

  const now = performance.now();

  if(now - lastShot < shootDelay) return;

  lastShot = now;

  const angle = Math.atan2(
    mouse.y-player.y,
    mouse.x-player.x
  );

  bullets.push(
    new Bullet(
      player.x,
      player.y,
      Math.cos(angle)*10,
      Math.sin(angle)*10
    )
  );
}

function explosion(x,y,color,count=20){

  for(let i=0;i<count;i++){
    particles.push(new Particle(x,y,color));
  }
}

function gameOver(){

  if(gameEnded) return;

  gameEnded = true;

  document.getElementById("gameOver").style.display = "flex";

  document.getElementById("finalScore").innerText =
    "Final Score: " + score;
}

function drawBackground(){

  const gradient = ctx.createRadialGradient(
    canvas.width/2,
    canvas.height/2,
    100,
    canvas.width/2,
    canvas.height/2,
    canvas.width
  );

  gradient.addColorStop(0,"#0f172a");
  gradient.addColorStop(1,"#020617");

  ctx.fillStyle = gradient;
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

let lastTime = 0;

function animate(time=0){

  const delta = time - lastTime;
  lastTime = time;

  ctx.save();

  if(shake > 0){

    ctx.translate(
      (Math.random()-0.5)*shake,
      (Math.random()-0.5)*shake
    );

    shake *= 0.9;
  }

  drawBackground();

  // stars
  stars.forEach(st=>{

    st.y += 0.3;

    if(st.y > canvas.height){
      st.y = 0;
      st.x = Math.random()*canvas.width;
    }

    ctx.fillStyle = "rgba(255,255,255,0.4)";
    ctx.fillRect(st.x,st.y,st.s,st.s);
  });

  // spawn enemy
  spawnTimer += delta;

  if(spawnTimer >= spawnRate && !gameEnded){

    enemies.push(new Enemy());

    spawnTimer = 0;

    if(spawnRate > 250){
      spawnRate -= 5;
    }
  }

  if(shooting){
    shoot();
  }

  player.move();
  player.draw();

  // bullets
  for(let bi = bullets.length-1; bi>=0; bi--){

    const b = bullets[bi];

    b.update();
    b.draw();

    if(
      b.x < 0 ||
      b.x > canvas.width ||
      b.y < 0 ||
      b.y > canvas.height
    ){
      bullets.splice(bi,1);
    }
  }

  // enemies
  for(let ei = enemies.length-1; ei>=0; ei--){

    const e = enemies[ei];

    e.update();
    e.draw();

    const distPlayer = Math.hypot(
      player.x-e.x,
      player.y-e.y
    );

    // hit player
    if(distPlayer < player.r + e.r){

      if(player.hitCooldown <= 0){

        player.hp -= 10;

        if(player.hp < 0){
          player.hp = 0;
        }

        player.hitCooldown = 30;

        shake = 10;
      }

      if(player.hp <= 0){
        gameOver();
      }
    }

    // bullet collision
    for(let bi = bullets.length-1; bi>=0; bi--){

      const b = bullets[bi];

      const dist = Math.hypot(
        b.x-e.x,
        b.y-e.y
      );

      if(dist < b.r + e.r){

        explosion(e.x,e.y,"#00ffff");

        enemies.splice(ei,1);
        bullets.splice(bi,1);

        score += 10;

        break;
      }
    }
  }

  // particles
  for(let pi = particles.length-1; pi>=0; pi--){

    const p = particles[pi];

    p.update();
    p.draw();

    if(p.life <= 0){
      particles.splice(pi,1);
    }
  }

  document.getElementById("hp").innerText = player.hp;
  document.getElementById("score").innerText = score;

  ctx.restore();

  if(!gameEnded){
    requestAnimationFrame(animate);
  }
}

animate();

window.addEventListener("resize", ()=>{

  resizeCanvas();

  player.x = canvas.width/2;
  player.y = canvas.height/2;
});
</script>

</body>
</html>
