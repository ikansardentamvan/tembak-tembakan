<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>NEON BLASTER MOBILE</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  overflow:hidden;
  background:#050816;
  touch-action:none;
}

canvas{
  display:block;
}

#ui{
  position:absolute;
  top:15px;
  left:15px;
  color:white;
  z-index:10;
  font-size:18px;
  text-shadow:0 0 10px cyan;
}

#gameOver{
  position:absolute;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:rgba(0,0,0,0.8);
  color:white;
  z-index:20;
  text-align:center;
}

#gameOver h1{
  font-size:50px;
  color:#00ffff;
}

#gameOver button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:10px;
  background:#00ffff;
  font-size:18px;
  font-weight:bold;
}

#info{
  position:absolute;
  bottom:10px;
  width:100%;
  text-align:center;
  color:#94a3b8;
  font-size:12px;
}

#shootBtn{
  position:absolute;
  right:20px;
  bottom:80px;
  width:80px;
  height:80px;
  border-radius:50%;
  background:rgba(0,255,255,0.2);
  border:2px solid cyan;
  z-index:15;
}
</style>
</head>

<body>

<div id="ui">
  ❤️ HP: <span id="hp">100</span><br>
  ⚡ Score: <span id="score">0</span>
</div>

<div id="gameOver">
  <h1>GAME OVER</h1>
  <p id="finalScore"></p>
  <button onclick="location.reload()">MAIN LAGI</button>
</div>

<div id="shootBtn"></div>

<div id="info">
  Kiri = gerak • Kanan = tembak
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();

window.addEventListener("resize", resize);

// TOUCH CONTROL
let moveTouch = null;
let shootTouch = false;
let target = {x:0,y:0};

canvas.addEventListener("touchstart",(e)=>{
  const t = e.touches[0];

  if(t.clientX < canvas.width/2){
    moveTouch = {x:t.clientX,y:t.clientY};
  }else{
    shootTouch = true;
    target.x = t.clientX;
    target.y = t.clientY;
  }
});

canvas.addEventListener("touchmove",(e)=>{
  const t = e.touches[0];

  if(moveTouch){
    moveTouch.x = t.clientX;
    moveTouch.y = t.clientY;
  }

  if(shootTouch){
    target.x = t.clientX;
    target.y = t.clientY;
  }
});

canvas.addEventListener("touchend",()=>{
  moveTouch = null;
  shootTouch = false;
});

// PC fallback
let mouse = {x:canvas.width/2,y:canvas.height/2};
document.addEventListener("mousemove",e=>{
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

const keys = {};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

class Player{
  constructor(){
    this.x = canvas.width/2;
    this.y = canvas.height/2;
    this.r = 20;
    this.speed = 5;
    this.hp = 100;
    this.cool = 0;
  }

  move(){

    if(moveTouch){
      const dx = moveTouch.x - this.x;
      const dy = moveTouch.y - this.y;
      this.x += dx * 0.05;
      this.y += dy * 0.05;
    }else{
      if(keys["w"]) this.y -= this.speed;
      if(keys["s"]) this.y += this.speed;
      if(keys["a"]) this.x -= this.speed;
      if(keys["d"]) this.x += this.speed;
    }

    this.x = Math.max(this.r,Math.min(canvas.width-this.r,this.x));
    this.y = Math.max(this.r,Math.min(canvas.height-this.r,this.y));

    if(this.cool>0) this.cool--;
  }

  draw(){

    ctx.beginPath();
    ctx.arc(this.x,this.y,this.r,0,Math.PI*2);

    ctx.fillStyle = this.cool>0 ? "#fff" : "#00ffff";
    ctx.shadowBlur = 20;
    ctx.shadowColor = "#00ffff";
    ctx.fill();
    ctx.shadowBlur = 0;

    const ang = Math.atan2(target.y-this.y,target.x-this.x);

    ctx.beginPath();
    ctx.moveTo(this.x,this.y);
    ctx.lineTo(
      this.x+Math.cos(ang)*35,
      this.y+Math.sin(ang)*35
    );
    ctx.strokeStyle="white";
    ctx.lineWidth=4;
    ctx.stroke();
  }
}

class Bullet{
  constructor(x,y,dx,dy){
    this.x=x;this.y=y;
    this.dx=dx;this.dy=dy;
    this.r=5;
  }
  update(){this.x+=this.dx;this.y+=this.dy;}
  draw(){
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle="yellow";
    ctx.fill();
  }
}

class Enemy{
  constructor(){
    this.x=Math.random()*canvas.width;
    this.y=-50;
    this.r=20;
    this.speed=2;
  }
  update(){
    const a=Math.atan2(player.y-this.y,player.x-this.x);
    this.x+=Math.cos(a)*this.speed;
    this.y+=Math.sin(a)*this.speed;
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle="red";
    ctx.fill();
  }
}

let player=new Player();
let bullets=[];
let enemies=[];
let score=0;
let lastShot=0;

function shoot(){
  const now=Date.now();
  if(now-lastShot<150) return;
  lastShot=now;

  const a=Math.atan2(target.y-player.y,target.x-player.x);

  bullets.push(new Bullet(
    player.x,player.y,
    Math.cos(a)*10,
    Math.sin(a)*10
  ));
}

function loop(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  player.move();
  player.draw();

  if(shootTouch) shoot();

  bullets.forEach((b,i)=>{
    b.update();b.draw();
    if(b.x<0||b.x>canvas.width||b.y<0||b.y>canvas.height)
      bullets.splice(i,1);
  });

  enemies.forEach((e,ei)=>{
    e.update();e.draw();

    bullets.forEach((b,bi)=>{
      const d=Math.hypot(b.x-e.x,b.y-e.y);
      if(d<e.r){
        enemies.splice(ei,1);
        bullets.splice(bi,1);
        score+=10;
      }
    });

    const dp=Math.hypot(player.x-e.x,player.y-e.y);
    if(dp<player.r+e.r){
      player.hp-=1;
      if(player.hp<=0){
        document.getElementById("gameOver").style.display="flex";
      }
    }
  });

  if(Math.random()<0.02){
    enemies.push(new Enemy());
  }

  document.getElementById("hp").innerText=player.hp;
  document.getElementById("score").innerText=score;

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
